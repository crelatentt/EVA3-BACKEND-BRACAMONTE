<!doctype html>
<html lang="en">
    <head>
        <title>TIENDA</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
    </head>

    <body class="container mt-2">
        <div class="alert alert-info text-center display-2" role="alert">TIENDA ONLINE</div>

        <div class="row mb-4 align-items-center">

            <div class="col-md-4 mb-3 mb-md-0">
                <form method="GET">
                    <div class="input-group">
                        <input type="text" class="form-control" name="q" placeholder="Buscar producto" value="">
                        <button class="btn btn-primary" type="submit">BUSCAR</button>
                    </div>
                </form>
            </div>

            <div class="col-md-4 mb-3 mb-md-0">
                <form method="GET">
                    <div class="input-group">
                        <select name="categoria" class="form-select">
                            <option value="">TODAS LAS CATEGORÍAS</option>
                            {% for c in categorias %}
                                <option value="{{ c.id }}" {% if categoria_sel == c.id|stringformat:"s" %}selected{% endif %}>{{ c.nombre }}</option>
                            {% endfor %}
                        </select>
                        <button class="btn btn-secondary" type="submit">FILTRAR</button>
                    </div>
                </form>
            </div>

            <div class="col-md-4 mb-3 mb-md-0">
            <div class="card p-2">
                {% if error_seguimiento %}
                    <div class="alert alert-danger mb-2" role="alert" style="font-size: 0.9rem;">
                        {{ error_seguimiento }}
                    </div>
                {% endif %}
                <form method="POST">
                    {% csrf_token %}
                    <div class="input-group">
                        <input type="text" class="form-control" name="token_seguimiento" placeholder="Ingresa aquí tu Token" required>
                        <button type="submit" class="btn btn-success">BUSCAR PEDIDO</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="row">
            {% for p in productos %}
                <div class="col-md-4 mb-3">
                    <div class="card">
                        {% if p.foto_1 %}
                        <img class="card-img-top w-100" style="width:100px;" src="{{ p.foto_1.url }}"/>
                        {% endif %}
                        <div class="card-body">
                            <h5 class="card-title">{{ p.nombre }}</h5>
                            <p class="card-text">PRECIO: ${{ p.precio_base }}</p>
                            <a href="{% url 'detalle_producto' p.id %}" class="btn btn-success">VER DETALLE PRODUCTO</a>
                        </div>
                        {% if p.producto_destacado %}
                        <div class="card-footer text-bg-warning">PRODUCTO DESTACADO!!</div>
                        {% endif %}
                    </div>
                </div>
            {% endfor %}
        </div>
    </body>
</html>

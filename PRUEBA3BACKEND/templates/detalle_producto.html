<!doctype html>
<html lang="en">
    <head>
        <title>TIENDA</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
    </head>

    <body class="container mt-2">
        <div class="alert alert-info text-center display-2" role="alert">DETALLE DEL PRODUCTO</div>

        <div class="card mb-3">
            {% if producto.foto_1 %}
                <img class="card-img-top mx-auto d-block" style="width:200px;" src="{{ producto.foto_1.url }}"/>
            {% endif %}

            {% if producto.foto_2 %}
                <img class="card-img-top mx-auto d-block" style="width:200px;" src="{{ producto.foto_2.url }}"/>
            {% endif %}

            {% if producto.foto_3 %}
                <img class="card-img-top mx-auto d-block" style="width:200px;" src="{{ producto.foto_3.url }}"/>
            {% endif %}

            <div class="card-body text-center">
                <h5 class="card-title">{{ producto.nombre }}</h5>
                <p class="card-text">PRECIO: ${{ producto.precio_base }}</p>
                <p class="card-text">DESCRIPCION: {{ producto.descripcion }}</p>
            </div>

            <div class="card-body text-center">
                <a href="{% url 'formulario_pedido' %}?producto={{ p.id }}" class="btn btn-success">SOLICITAR ESTE PRODUCTO</a>
            </div>
        </div>

        <a href="{% url 'home' %}" class="btn btn-primary mb-3">Volver a la tienda</a>
    </body>
</html>

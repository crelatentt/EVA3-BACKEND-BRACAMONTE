<!doctype html>
<html lang="en">
    <head>
        <title>TIENDA</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
    </head>

    <body class="container mt-2">
        <div class="alert alert-info text-center display-2" role="alert">CONFIRMACIÓN DE PEDIDO</div>

        <div class="alert alert-success">
            <h4 class="alert-heading">¡Gracias por tu pedido!</h4>
            <p>Hemos recibido tu solicitud y nos pondremos en contacto contigo pronto.</p>
            <hr>
            <p class="mb-0">Tu número de confirmación es: <strong>{{ token }}</strong></p>
        </div>

        <div class="alert alert-info text-center display-2" role="alert">SEGUIMIENTO DE TU PEDIDO</div>
        <p>Puedes hacer el seguimiento de tu pedido en el siguiente enlace:</p>
        <p><a href="{{ url_seguimiento }}">{{ url_seguimiento }}</a></p>

        <btn><a href="{% url 'home' %}" class="btn btn-primary">VOLVER A LA TIENDA</a></btn>
    </body>
</html>
